version: '3.8'

services:
  celestia-node:
    image: runonflux/celestia-node:latest
    command: ["light", "start", "--core.ip", "consensus.lunaroasis.net", "--keyring.accname", "cel-name-my"]
    environment:
      - CELESTIA_NODE_URL=http://celestia-node:26657
    ports:
      - "26657:26657"
    networks:
      - blockchain-network

  anvil:
    build:
      context: .
      dockerfile: Dockerfile-anvil
    command: ["anvil", "--host", "0.0.0.0"]
    environment:
      - ETHEREUM_NODE_URL=http://anvil:8545
    ports:
      - "8545:8545"
    networks:
      - blockchain-network

networks:
  blockchain-network:
    driver: bridge
