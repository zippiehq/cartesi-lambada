version: '3.8'

services:
  rust-app-ethereum-posting:
    build:
      context: .
      dockerfile: Dockerfile-posting
    environment:
      - ETHEREUM_NODE_URL=http://anvil:8545
      - CELESTIA_NODE_URL=http://celestia-node:26658
      - DB_PATH=/data/db
      - PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      - AUTH_TOKEN=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJBbGxvdyI6WyJwdWJsaWMiLCJyZWFkIiwid3JpdGUiLCJhZG1pbiJdfQ.vMMyiR2MdpHjW9eLNH9cfR9S2tLfvJZK1tOZywl-Ars
    depends_on:
      - celestia-node
      - anvil
    volumes:
      - ./rust-app-ethereum-posting-data:/data/db
    networks:
      - blockchain-network
    command: ["./target/release/celestia-example"]

  rust-app-subscriber:
    build:
      context: .
      dockerfile: Dockerfile-subscriber
    environment:
      - ETHEREUM_NODE_URL=http://anvil:8545
      - CELESTIA_NODE_URL=http://celestia-node:26658
      - DB_PATH=/data/db
    depends_on:
      - celestia-node
      - anvil
    volumes:
      - ./rust-app-subscriber-data:/data/db
    networks:
      - blockchain-network
    command: ["./target/release/subscribe-celestia-blocks"]

  celestia-node:
    image: ghcr.io/celestiaorg/celestia-node:v0.13.7
    volumes:
      - ./data/celestia-node:/home/celestia/
    command: ["celestia", "light", "start", "--core.ip", "consensus.lunaroasis.net", "--p2p.network", "mocha"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:26657/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    ports:
      - "26657:26657"
      - "26656:26656"
      - "26658:26658"
    network_mode: host

  anvil:
    build:
      context: .
      dockerfile: Dockerfile-anvil
    command: ["anvil", "--host", "0.0.0.0"]
    ports:
      - "8545:8545"
    networks:
      - blockchain-network

networks:
  blockchain-network:
    driver: bridge
